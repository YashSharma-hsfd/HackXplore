name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.0"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --python 3.10

      - name: Lint (ruff)
        run: uv run ruff check src tests eval

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Unit tests
        run: uv run pytest -m "not eval"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rag-service:ci .
