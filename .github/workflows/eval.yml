name: Eval Regression

# Evaluation as CI: every PR runs RAGAS over a 10-question subset and the
# job fails if faithfulness regresses. Also runnable on demand.
on:
  pull_request:
  workflow_dispatch:

# A new commit on the same branch supersedes an in-flight eval run.
concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ragas-regression:
    runs-on: ubuntu-latest
    steps:
      # lfs: true pulls the eval corpus PDFs — they are stored via Git LFS,
      # so a default checkout would yield pointer files and the eval would fail.
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.0"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --python 3.10

      # Needs GEMINI_API_KEY (generation + embedding) and the API key for
      # whichever JUDGE_PROVIDER is active. All judge keys are forwarded
      # unconditionally so a future provider swap is just a JUDGE_PROVIDER
      # change in the workflow env / repo variables — no .yml edit needed.
      # Missing keys cause the regression test to skip rather than fail.
      - name: RAGAS regression eval
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run pytest -m eval -v
